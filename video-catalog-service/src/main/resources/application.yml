server:
  port: 8082

spring:
  application:
    name: video-catalog-service

  # ═══════════════════════════════════════
  # PostgreSQL Configuration
  # ═══════════════════════════════════════
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/video_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ═══════════════════════════════════════
  # JPA / Hibernate Configuration
  # ═══════════════════════════════════════
  jpa:
    hibernate:
      ddl-auto: update  # Dev: update | Prod: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ═══════════════════════════════════════
  # Kafka Configuration
  # ═══════════════════════════════════════
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: video-catalog-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# ═══════════════════════════════════════
# MinIO Configuration
# ═══════════════════════════════════════
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:videos}

# ═══════════════════════════════════════
# Logging
# ═══════════════════════════════════════
logging:
  level:
    com.streamingvideo.video_catalog_service: DEBUG
    org.springframework.kafka: INFO
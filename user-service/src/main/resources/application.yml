server:
  port: 8081
spring:
  application:
    name: user-service
    # ═══════════════════════════════════════
    # PostgreSQL Configuration
    # ═══════════════════════════════════════
    datasource:
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/user_db
      username: ${DB_USERNAME:postgres}
      password: ${DB_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver

    # ═══════════════════════════════════════
    # JPA / Hibernate Configuration
    # ═══════════════════════════════════════
    jpa:
      hibernate:
        ddl-auto: update  # Dev: update | Prod: validate
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true
# ═══════════════════════════════════════
# JWT Configuration
# ═══════════════════════════════════════
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024StreamingVideo}
  access-token-expiration: 86400000     # 24h
  refresh-token-expiration: 604800000   # 7d

# ═══════════════════════════════════════
# Logging
# ═══════════════════════════════════════
logging:
  level:
    com.streamingvideo.userservice: DEBUG
    org.springframework.security: DEBUG